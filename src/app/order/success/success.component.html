<div class="py-5 px-4">
  <div class="container">
    <div class="row">
      <div class="col-lg-8 mx-auto">

        <!-- Загрузка -->
        <div *ngIf="isLoading" class="d-flex flex-column justify-content-center align-items-center" style="min-height: 400px;">
          <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
            <span class="visually-hidden">Загрузка...</span>
          </div>
          <p class="lead text-muted mt-3">Активация подписки...</p>
          <p class="text-muted small">Пожалуйста, подождите</p>
        </div>

        <!-- Ошибка -->
        <div *ngIf="error && !isLoading" class="text-center">
          <div class="card shadow-lg border-0 mx-auto" style="max-width: 600px;">
            <div class="card-body p-5">
              <div class="mb-4">
                <span class="display-1 text-danger"><i class="fas fa-times"></i></span>
              </div>
              <h3 class="card-title fw-bold mb-3 text-danger">Ошибка активации</h3>
              <p class="card-text text-muted mb-4">{{ error }}</p>
              <button class="btn btn-primary btn-lg px-5" (click)="goToHome()">
                Перейти на главную
              </button>
            </div>
          </div>
        </div>

        <!-- Успех -->
        <div *ngIf="success && !isLoading && !error" class="text-center">
          <div class="card shadow-lg border-0 mx-auto" style="max-width: 600px;">
            <div class="card-body p-5">
              <div class="mb-4">
                <span class="display-1 text-success"><i class="far fa-check-circle"></i></span>
              </div>
              <h3 class="card-title fw-bold mb-3 text-success">Подписка успешно активирована!</h3>
              <p class="card-text text-muted mb-4">
                Ваш ключ доступа:
              </p>
              <div class="bg-light p-3 rounded-2 mb-4 border">
                <a [href]="subscriptionUrl" target="_blank" class="text-decoration-none text-primary">
                  <code class="text-break">{{ subscriptionUrl }}</code>
                </a>
              </div>
              <div class="alert alert-info rounded-3 border-0 mb-4">
                <small class="d-flex align-items-start text-start">
                  <span class="me-2"><i class="fas fa-info-circle"></i></span>
                  <span>Инструкция по подключению отправлена на ваш email адрес.</span>
                </small>
              </div>
              <button class="btn btn-primary btn-lg px-5" (click)="goToSubscription()">
                Перейти на подписку
              </button>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
